# Vibe config for make-me-incredibly-rich-with-no-starting-capital-figure-everything-on-your-own/security-director
# Generated by Orchestrator — do not set system_prompt_id; Vibe uses default + AGENTS.md

enable_auto_update = false
active_model = "labs-devstral-small-2512"

# Devstral Small 2 model (must be defined before use)
[[models]]
name = "labs-devstral-small-2512"
provider = "mistral"
alias = "labs-devstral-small-2512"
temperature = 0.2
input_price = 0.1
output_price = 0.3
thinking = "off"

# CEO runs in programmatic/streaming mode; ask_user_question requires interactive UI.
# CEO asks questions as regular message content instead; founder replies via chat.
enable_telemetry = false
auto_approve = true

# Tool permissions: allow Swarm Bus and Computer Use MCP tools
[tool_permissions]
default = "allow"

# Swarm Bus: X-Agent-Id and X-Business-Id are required for inbox/messaging (identity = business_id--agent_role).
[[mcp_servers]]
name = "swarm-bus"
transport = "http"
url = "http://localhost:3100/mcp"
headers = { "X-Agent-Id" = "security-director", "X-Business-Id" = "make-me-incredibly-rich-with-no-starting-capital-figure-everything-on-your-own" }

[[mcp_servers]]
name = "computer-use"
transport = "http"
url = "http://localhost:3200/mcp"
headers = { "X-Agent-Id" = "security-director", "X-Business-Id" = "make-me-incredibly-rich-with-no-starting-capital-figure-everything-on-your-own" }
