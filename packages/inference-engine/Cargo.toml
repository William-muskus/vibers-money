[package]
name = "vibers-inference"
version = "0.1.0"
edition = "2021"
description = "OpenAI-compatible inference engine for vibers-money (stub + Candle-ready)"

[dependencies]
axum = "0.7"
tokio = { version = "1", features = ["full"] }
toml = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tower-http = { version = "0.5", features = ["cors"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
anyhow = "1"
clap = { version = "4", features = ["derive"] }
uuid = { version = "1", features = ["v4"] }
reqwest = { version = "0.12", features = ["json", "stream"] }
futures-util = "0.3"
bytes = "1"

# Optional: Candle inference (enable with --features candle)
candle-core = { version = "0.8", optional = true }
candle-nn = { version = "0.8", optional = true }
tokenizers = { version = "0.21", optional = true }
candle-transformers = { version = "0.8", optional = true }
rand = { version = "0.8", optional = true }

[features]
default = []
# Enable Candle for local inference (Phase 3–5)
candle = ["dep:candle-core", "dep:candle-nn", "dep:tokenizers", "dep:candle-transformers", "dep:rand"]
cuda = ["candle", "candle-core/cuda", "candle-nn/cuda"]
