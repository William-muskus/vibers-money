# Run from repo root. Frontend: deploy separately (e.g. Vercel). This runs orchestrator + swarm-bus + Redis.
# Build: docker compose build
# Run:   docker compose up -d
# Env:   set in .env or pass via docker compose --env-file .env

services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]

  swarm-bus:
    build:
      context: .
      dockerfile: packages/swarm-bus-mcp/Dockerfile
    ports: ["3100:3100"]
    environment:
      SWARM_BUS_PORT: "3100"
      REDIS_URL: "redis://redis:6379"
      # When running with profile local-inference, point to the inference sidecar for fused chains
      FUSED_SIDECAR_URL: "http://inference:8080"
    depends_on: [redis]

  orchestrator:
    build:
      context: .
      dockerfile: packages/orchestrator/Dockerfile
    ports: ["3000:3000"]
    environment:
      SWARM_BUS_URL: "http://swarm-bus:3100"
      REDIS_URL: "redis://redis:6379"
      # Set MISTRAL_API_KEY or LOCAL_LLM_API_BASE for inference
      # Set FRONTEND_ORIGIN to lock CORS (e.g. https://your-app.vercel.app)
    volumes:
      - businesses_data:/app/businesses
    depends_on: [swarm-bus]

  inference:
    build:
      context: .
      dockerfile: packages/inference-engine/Dockerfile
    ports: ["8080:8080"]
    environment:
      LOG_JSON: "1"
      # Override in .env or docker compose: path to GGUF inside container (e.g. /app/models/your.gguf)
      MODEL_PATH: "/app/models/main.gguf"
      # Optional: draft model for speculative decoding
      # DRAFT_MODEL_PATH: "/app/models/draft.gguf"
    volumes:
      - ./packages/inference-engine/models:/app/models:ro
      - ./packages/inference-engine/configs:/app/configs:ro
    profiles: ["local-inference"]

volumes:
  redis_data: {}
  businesses_data: {}
